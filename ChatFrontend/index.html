<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat App</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #38bdf8;
      cursor: pointer;
    }
    .chat {
      display: none;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .msg {
      background: #1e293b;
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
    }
    .input-box {
      display: flex;
      padding: 10px;
      background: #020617;
    }
    .input-box input {
      flex: 1;
    }
  </style>
</head>
<body>

<div id="home" class="center">
  <h1>?? Chat App</h1>
  <input id="name" placeholder="Your Name" />
  <input id="room" placeholder="Room ID" />
  <button onclick="createRoom()">Create Room</button>
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="chat" class="chat">
  <div class="messages" id="messages"></div>
  <div class="input-box">
    <input id="messageInput" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let stompClient = null;
let currentRoom = "";

function connect(roomId) {
  const socket = new SockJS("http://localhost:8081/ws");
  stompClient = Stomp.over(socket);

  stompClient.connect({}, function () {
    stompClient.subscribe("/topic/chat/" + roomId, function (msg) {
      showMessage(JSON.parse(msg.body));
    });
  });
}

function createRoom() {
  const room = document.getElementById("room").value;

  fetch(`http://localhost:8080/group/create_group/${room}`, { method: "POST" })
    .then(res => res.text())
    .then(() => startChat(room));
}

function joinRoom() {
  const room = document.getElementById("room").value;

  fetch(`http://localhost:8080/group/get_group/${room}`)
    .then(res => {
      if (res.status === 200) {
        startChat(room);
      } else {
        alert("Room not found");
      }
    });
}

function startChat(room) {
  currentRoom = room;
  document.getElementById("home").style.display = "none";
  document.getElementById("chat").style.display = "flex";

  connect(room);
fetch(`http://localhost:8081/get_all_messages/${room}`)
  .then(res => res.json())
  .then(data => {
    console.log("API DATA:", data);
    data.forEach(showMessage);
  });
}

function sendMessage() {
  const content = document.getElementById("messageInput").value;
  const sender = document.getElementById("name").value;
  const roles="TEACHER";

  const msg = {
   sender: sender,
    content: content,
    groupId: currentRoom,
    roles: roles,
    timestamp: Date.now()
     
  };

  stompClient.send("/app/chat_send", {}, JSON.stringify(msg));
  document.getElementById("messageInput").value = "";
}

function showMessage(message) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<b>${message.sender}</b>: ${message.content}<br><small>${message.timestamp}</small>`;
  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
